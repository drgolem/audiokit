name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libflac-dev libogg-dev libopus-dev libopusfile-dev portaudio19-dev

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libflac-dev libogg-dev libopus-dev libopusfile-dev portaudio19-dev

      - name: Vet
        run: go vet ./...
